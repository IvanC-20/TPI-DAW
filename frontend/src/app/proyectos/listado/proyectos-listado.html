<app-template>
    <div id="layout">
        <aside id="panel-izquierdo">
            <p-button 
                icon="pi pi-plus" 
                label="Nuevo" 
                severity="success" 
                [fluid]="true"
                (click)="crearProyecto()">
            </p-button>
            <nav id="acciones">
                <div>
                    <h4>+ Acciones...</h4>
                    <p-menu 
                        #menuExportar 
                        [model]="opcionesExportar" 
                        [popup]="true" 
                        appendTo="body" 
                    />           
                    <p-button 
                        icon="pi pi-file-export" 
                        label="Exportar" 
                        severity="secondary"
                        (click)="menuExportar.toggle($event)">
                    </p-button>
                </div>
            <!-- <p-button icon="pi pi-file-export" label="Exportar" severity="secondary" (click)="menuExportar.toggle($event)"></p-button> -->
                <!-- <p-menu #menuExportar [model]="opcionesExportar" [popup]="true" appendTo="body" /> -->
            </nav>
        </aside>
        <main id="panel-derecho">
            <app-fuzzy-search
                #fuzzySearch
                [items]="proyectosFiltradosPorEstado"
                searchKey="nombre"
                placeholder="Buscar por nombre..."
                (resultados)="onResultados($event)" 
            />
                    <!-- <p-button 
                        id="boton-gestionar-tareas" 
                        icon="pi pi-list" 
                        pTooltip="Gestionar Tareas"
                        (click)="gestionarTareas(proyecto)">
                    </p-button>
                    <p-button 
                        icon="pi pi-pencil" 
                        pTooltip="Editar Proyecto" 
                        severity="warn"
                        (click)="editarProyecto(proyecto)">
                    </p-button>
                    <p-button 
                        icon="pi pi-copy" 
                        pTooltip="Copiar datos" 
                        severity="secondary"
                        (click)="copiarAlPortapapeles(proyecto)">
                    </p-button> -->
            <p-table id="tabla" [value]="proyectos()" [tableStyle]="{ 'min-width': '50rem' }" [scrollable]="true" scrollHeight="60vh">
                <ng-template #header>
                    <tr>
                        <th><p-checkbox [(ngModel)]="seleccionarTodos" [binary]="true" (onChange)="toggleSeleccionarTodos()"></p-checkbox></th>
                        <th>Nombre</th>
                        <th>Cliente</th>
                        <th>Estado</th>
                        <th>Finaliza en</th>
                    </tr>
                </ng-template>
                <ng-template #body let-proyecto>
                    <tr>
                        <td><p-checkbox [(ngModel)]="proyecto.seleccionado" [binary]="true"></p-checkbox></td>
                        <td>{{ proyecto.nombre }}</td>
                        <td>{{ proyecto.cliente ? proyecto.cliente.nombre : '' }}</td>
                        <td><span [class]="'badge badge-' + proyecto.estado.toLowerCase()">{{ proyecto.estado }}</span></td>
                        <td [class]="estadoFecha(proyecto).clase">{{ estadoFecha(proyecto).texto }}</td>
                    </tr>
                </ng-template>
                <ng-template #emptymessage>
                    <tr>
                        <td colspan="5">No se encontraron proyectos.</td>
                    </tr>
                </ng-template>
            </p-table>
        </main>
    </div>
</app-template>
<app-gestion-proyecto [(visible)]="dialogVisible" [(proyectoSeleccionado)]="proyectoSeleccionado"></app-gestion-proyecto>
