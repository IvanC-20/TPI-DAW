<p-dialog [header]="header()" [modal]="true" [(visible)]="visible" [style]="{ width: '25rem' }"
    (onHide)="cerrarDialog()">

    <form [formGroup]="form">
        <div id="contenedor-formulario">

            <input pInputText type="text" id="nombre" placeholder="Nombre" formControlName="nombre" />

            <ng-select
                formControlName="cliente"
                [items]="clientes()"
                bindLabel="nombre"
                placeholder="Cliente"
                [clearable]="true"
            />

            <button id="boton-gestionar-clientes" pButton label="Gestionar Clientes" (click)="gestionarClientes()"></button>

            @if (proyectoSeleccionado()) {
            <p-select id="estado" formControlName="estado" [options]="estados()" placeholder="Estado" appendTo="body" />
            }

            <input pInputText type="date" id="fechaFinalizacion" formControlName="fechaFinalizacion" placeholder="Fecha de finalización" />

            <button pButton id="guardar" label="Guardar" severity="success" (click)="guardarProyecto()"></button>

        </div>
    </form>
</p-dialog>
<app-clientes-listado [(visible)]="dialogClientesVisible"></app-clientes-listado>
