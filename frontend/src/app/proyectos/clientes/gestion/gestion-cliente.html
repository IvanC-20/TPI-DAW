<p-dialog [header]="header()" [modal]="true" [(visible)]="visible" [style]="{ width: '25rem' }" [visible]="visible()"
    (onHide)="cerrarDialog()">

    <form [formGroup]="form">
        <div id="contenedor-formulario">

            <input pInputText type="text" id="nombre" placeholder="Nombre" formControlName="nombre" />
            <input pInputText type="text" id="telefono" placeholder="Telefono" formControlName="telefono" />
            <input pInputText type="email" id="correo" placeholder="Email" formControlName="correo" />

            @if (clienteSeleccionado()) {
            <p-select id="estado" formControlName="estado" [options]="estados()" placeholder="Estado" appendTo="body" />
            }

        </div>
    </form>

    <div id="contenedor-guardar">
        <button pButton label="Guardar" severity="success" (click)="guardarCliente()"></button>
    </div>

</p-dialog>
